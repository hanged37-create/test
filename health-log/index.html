<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>식단·운동 기록</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>식단·운동 기록</h1>
      <div class="header-actions">
        <button type="button" id="backup-btn" title="전체 데이터를 JSON 파일로 백업">백업</button>
        <button type="button" id="import-btn" title="백업 파일에서 가져오기">가져오기</button>
        <input type="file" id="import-file-input" accept="application/json" hidden />
      </div>
    </header>

    <div class="tabs" id="tab-buttons">
      <button class="tab-btn active" data-type="diet">🍱 식단</button>
      <button class="tab-btn" data-type="exercise">🏃 운동</button>
    </div>

    <div class="date-nav">
      <button type="button" id="prev-day-btn" aria-label="이전 날">‹</button>
      <div class="date-label-wrapper">
        <span id="date-label"></span>
        <input type="date" id="date-picker" />
      </div>
      <button type="button" id="next-day-btn" aria-label="다음 날">›</button>
    </div>
    <button type="button" id="today-btn" hidden>오늘로</button>

    <ul id="log-list" class="log-list"></ul>

    <div id="day-total" class="day-total" hidden></div>

    <form id="add-form" class="add-bar">
      <div class="autocomplete-wrapper">
        <input
          type="text"
          id="entry-input"
          placeholder="방금 먹은 것 / 한 운동을 입력..."
          autocomplete="off"
          required
        />
        <ul class="autocomplete-list" id="entry-suggestions" hidden></ul>
      </div>
      <button type="submit">추가</button>
    </form>
  </div>

  <div id="calorie-modal" class="modal-overlay" hidden>
    <div class="modal-box">
      <p id="calorie-modal-label"></p>
      <input type="number" id="calorie-modal-input" placeholder="칼로리 (kcal)" inputmode="numeric" min="0" />
      <div class="modal-actions">
        <button type="button" id="calorie-modal-skip">건너뛰기</button>
        <button type="button" id="calorie-modal-save">저장</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="../vendor/sql-wasm.js"></script>
  <script src="script.js"></script>
</body>
</html>
