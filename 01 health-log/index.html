<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>식단·운동 기록</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="auth-gate" class="auth-gate">
    <div class="auth-box">
      <h1>식단·운동 기록</h1>
      <p>구글 계정으로 로그인하면 PC와 폰에서 자동으로 동기화됩니다.</p>
      <button type="button" id="google-signin-btn">🔵 Google로 로그인</button>
      <p id="auth-status" class="auth-status"></p>
    </div>
  </div>

  <div class="app" id="app-root" hidden>
    <header class="app-header">
      <h1>식단·운동 기록</h1>
      <div class="header-actions">
        <button type="button" id="settings-btn" title="기초대사량/나이 설정">⚙ 설정</button>
        <button type="button" id="backup-btn" title="전체 데이터를 JSON 파일로 백업">백업</button>
        <button type="button" id="import-btn" title="백업 파일에서 가져오기">가져오기</button>
        <button type="button" id="signout-btn" title="로그아웃">로그아웃</button>
        <input type="file" id="import-file-input" accept="application/json" hidden />
      </div>
    </header>
    <div id="user-email" class="user-email"></div>

    <div class="tabs" id="tab-buttons">
      <button class="tab-btn active" data-type="diet">🍱 식단</button>
      <button class="tab-btn" data-type="exercise">🏃 운동</button>
    </div>

    <div class="date-nav">
      <button type="button" id="prev-day-btn" aria-label="이전 날">‹</button>
      <div class="date-label-wrapper">
        <span id="date-label"></span>
        <input type="date" id="date-picker" />
      </div>
      <button type="button" id="next-day-btn" aria-label="다음 날">›</button>
    </div>
    <button type="button" id="today-btn" hidden>오늘로</button>

    <ul id="log-list" class="log-list"></ul>

    <div id="day-total" class="day-total" hidden></div>

    <form id="add-form" class="add-bar">
      <div class="autocomplete-wrapper">
        <input
          type="text"
          id="entry-input"
          placeholder="방금 먹은 것 / 한 운동을 입력..."
          autocomplete="off"
          required
        />
        <ul class="autocomplete-list" id="entry-suggestions" hidden></ul>
      </div>
      <button type="submit">추가</button>
    </form>
  </div>

  <div id="calorie-modal" class="modal-overlay" hidden>
    <div class="modal-box">
      <p id="calorie-modal-label"></p>
      <input type="number" id="calorie-modal-input" placeholder="칼로리 (kcal)" inputmode="numeric" min="0" />
      <div id="calorie-modal-macros" class="modal-macros">
        <input type="number" id="calorie-modal-carb" placeholder="탄수화물(g)" inputmode="numeric" min="0" />
        <input type="number" id="calorie-modal-protein" placeholder="단백질(g)" inputmode="numeric" min="0" />
        <input type="number" id="calorie-modal-fat" placeholder="지방(g)" inputmode="numeric" min="0" />
      </div>
      <div class="modal-actions">
        <button type="button" id="calorie-modal-skip">건너뛰기</button>
        <button type="button" id="calorie-modal-save">저장</button>
      </div>
    </div>
  </div>

  <div id="settings-modal" class="modal-overlay" hidden>
    <div class="modal-box">
      <p>입력하시면 식단/운동을 분석해서 부족한 점을 알려드려요.</p>
      <input type="number" id="settings-bmr-input" placeholder="기초대사량 (kcal)" inputmode="numeric" min="0" />
      <input type="number" id="settings-age-input" placeholder="나이" inputmode="numeric" min="0" />
      <select id="settings-gender-input">
        <option value="">성별 선택</option>
        <option value="male">남성</option>
        <option value="female">여성</option>
      </select>
      <select id="settings-goal-input">
        <option value="maintain">목표: 유지</option>
        <option value="lose">목표: 체중감량(다이어트)</option>
        <option value="gain">목표: 근육증가(벌크업)</option>
      </select>
      <p class="modal-sub-label">하루 탄단지 목표(g, 선택) — 비워두면 위 정보로 자동 계산</p>
      <div class="modal-macros">
        <input type="number" id="settings-carb-input" placeholder="탄수화물(g)" inputmode="numeric" min="0" />
        <input type="number" id="settings-protein-input" placeholder="단백질(g)" inputmode="numeric" min="0" />
        <input type="number" id="settings-fat-input" placeholder="지방(g)" inputmode="numeric" min="0" />
      </div>
      <div class="modal-actions">
        <button type="button" id="settings-modal-cancel">취소</button>
        <button type="button" id="settings-modal-save">저장</button>
      </div>
    </div>
  </div>

  <div id="migrate-modal" class="modal-overlay" hidden>
    <div class="modal-box">
      <p>이 기기에 예전에 저장해둔 기록이 있어요. 지금 계정으로 가져올까요? (한 번만 물어봐요)</p>
      <div class="modal-actions">
        <button type="button" id="migrate-skip">아니요</button>
        <button type="button" id="migrate-import">가져오기</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="../vendor/sql-wasm.js"></script>
  <script src="script.js?v=3"></script>
</body>
</html>
