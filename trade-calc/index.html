<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>수출입 환율 계산기</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <div class="app">
      <h1>수출입 환율 계산기</h1>

      <div class="toolbar">
        <label class="btn-file">
          엑셀 가져오기 (T.I작성일/수리일)
          <input type="file" id="excel-input" accept=".xlsx,.xls" hidden />
        </label>
        <button type="button" id="add-row-btn">행 추가</button>
        <button type="button" id="export-btn">엑셀로 내보내기</button>
        <button type="button" id="export-journal-btn">일반전표로 내보내기</button>
        <button type="button" id="clear-btn" class="danger">전체 삭제</button>
        <span id="status-msg" class="status-msg" hidden></span>
      </div>

      <div class="table-wrap">
        <table id="trade-table">
          <thead>
            <tr>
              <th>구분</th>
              <th>T.I 작성일</th>
              <th>수리일</th>
              <th>세금계산서 작성일</th>
              <th>신고필증/세금계산서</th>
              <th>통화</th>
              <th>주문외화</th>
              <th>환율</th>
              <th>실제원화</th>
              <th>관세</th>
              <th>부가세</th>
              <th>원화+관세</th>
              <th>거래처명</th>
              <th>거래처코드</th>
              <th>적요</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="trade-tbody"></tbody>
          <tfoot>
            <tr>
              <td colspan="11" class="total-label">합계 (원화+관세)</td>
              <td id="total-krw" class="total-value">0</td>
              <td colspan="4"></td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>

  <datalist id="counterparty-list"></datalist>

  <div id="toast" class="toast" hidden></div>

  <script src="vendor/sql-wasm.js"></script>
  <script src="script.js"></script>
</body>
</html>
